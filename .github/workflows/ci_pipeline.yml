name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # JOB 1 : Qualité et Tests
  build-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true   # On demande à GitHub de télécharger les gros fichiers (ton modèle .joblib)

      # Installation de uv (pour la rapidité)
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-suffix: "python-3.13"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Installation des dépendances
      - name: Install dependencies
        run: |
          uv pip install --system .
          uv pip install --system ruff black pytest httpx

      # Vérification du formatage (Black)
      - name: Check formatting with Black
        run: black --check .

      # Analyse statique du code (Ruff)
      - name: Lint With Ruff
        run: ruff check .

      # Exécution des tests unitaires
      - name: Run test with pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: uv run pytest tests/

  # JOB 2 : Déploiement Continu (CD) vers Hugging Face
  deploy-to-huggingface:
    name: Push to Hugging Face Hub
    # Ce job ne s'exécute que si les tests (job précédent) ont réussi
    needs: [build-and-test]
    runs-on: ubuntu-latest
    # Sécurité : on ne déploie que si on est sur la branche 'main' et que c'est un 'push'
    # (Pas de déploiement lors d'une simple Pull Request)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour l'historique git
          lfs: true      # On récupère aussi le modèle pour l'envoyer sur HF

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: "ArturAgababyanML" # Ton nom d'utilisateur HF
          HF_SPACE_NAME: "projet5"        # Le nom exact de ton Space HF
        run: |
          echo "Initialisation de git pour le déploiement..."
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Actions"
          
          # Ajout du remote Hugging Face avec le token sécurisé
          git remote add space https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          
          # Force push pour synchroniser le Space avec le repo GitHub
          # Le --force garantit que le Space reflète exactement le contenu de GitHub
          git push --force space main