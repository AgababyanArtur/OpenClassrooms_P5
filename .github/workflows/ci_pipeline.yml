name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # JOB 1 : Qualité et Tests
  build-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Note : On retire "lfs: true" car on utilise Xet

      # --- NOUVEAU : Installation de git-xet ---
      - name: Install git-xet extension
        run: |
          # Téléchargement et installation de l'outil officiel Hugging Face Xet
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/huggingface/xet-core/refs/heads/main/git_xet/install.sh | sudo sh
          
          # Configuration globale de git pour utiliser Xet
          git xet install

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-suffix: "python-3.13"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          uv pip install --system .
          uv pip install --system ruff black pytest httpx

      # On force la "matérialisation" des fichiers Xet (téléchargement du vrai contenu) pour les tests
      - name: Pull Xet files
        run: git checkout .

      - name: Check formatting with Black
        run: black --check .

      - name: Lint With Ruff
        run: ruff check .

      - name: Run test with pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: uv run pytest tests/

  # JOB 2 : Déploiement Continu (CD) vers Hugging Face
  deploy-to-huggingface:
    name: Push to Hugging Face Hub
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # --- NOUVEAU : Installation de git-xet pour le déploiement ---
      - name: Install git-xet extension
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/huggingface/xet-core/refs/heads/main/git_xet/install.sh | sudo sh
          git xet install

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: "ArturAgababyanML"
          HF_SPACE_NAME: "projet5"
        run: |
          echo "Initialisation de git pour le déploiement..."
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Actions"
          
          # Ajout du remote Hugging Face
          git remote add space https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          
          # Push vers le Space (git-xet s'occupera du transfert des gros fichiers)
          git push --force space main
