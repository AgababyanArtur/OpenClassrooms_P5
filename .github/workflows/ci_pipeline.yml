name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # 1. On fusionne Lint et Test en un seul job "Quality & Test"
  build-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-suffix: "python-3.13"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # 2. Optimisation : Installation unique de TOUTES les dépendances
      # Astuce : Défini tes outils de dev (black, ruff, pytest) dans pyproject.toml
      # Si tu ne l'as pas fait, la commande ci-dessous les installe manuellement mais en une fois.
      - name: Install dependencies
        run: |
          uv pip install --system . 
          uv pip install --system ruff black pytest

      # 3. Exécution séquentielle : Si le formatage échoue, on s'arrête là (fail-fast)
      - name: Check formatting with Black
        run: black --check .

      - name: Lint With Ruff
        run: ruff check .

      - name: Run test with pytest
        run: pytest tests/

  deploy-to-huggingface:
    name: Push to Hugging Face Hub
    # Ce job ne démarre que si 'build-and-test' a réussi
    needs: [build-and-test] 
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: "ArturAgababyanML"
          HF_SPACE_NAME: "projt5"
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Actions"
          # L'utilisation de --force est correcte pour un déploiement miroir, 
          # mais attention si tu modifies des fichiers directement sur Hugging Face.
          git push https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main:main --force