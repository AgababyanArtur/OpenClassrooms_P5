on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    
jobs:
    install:
        name: Istall and Cache Dependencies
        runs-on: ubuntu-latest
        steps:
            - name: Check out the repository
              uses: actions/checkout@v4

            - name: Set up Python 3.13.5
              uses: actions/setup-python@v5
              with:
                python-version: "3.13.5"

            - name: Cache pip dependencies
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: ${{runner.os}}-pip-${{hashFiles('**/requirements.txt')}}
                restore-keys: |
                    ${{runner.os}}-pip-
            
            - name: Install dependencies
              run: pip install -r requirements.txt
    
    test:
        name: Run test
        needs: install
        runs-on: ubuntu-latest
        steps:
            - name: Check out the repository
              uses: actions/checkout@v4
            
            - name: Set up Python 3.13.5
              uses: actions/setup-python@v5
              with:
                python-version: "3.13.5"
            
            - name: Load cached pip dependencies
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: ${{runner.os}}-pip-${{hashFiles('**/requirements.txt')}}
                restire-keys: |
                    ${{runner.os}}
                 
            - name: install dependencies
              run: pip install -r requirements.txt
            
            - name: Run test with pytest
              run: pytest tests/
            
    lint-and-format:
        name: Lint & Format Code
        needs: install
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions.checkout@v4

            - name: Set up Python 3.13.5
              uses: setup-python@v5
              with:
                python-version: "3.13.5"

            - name: Install linting tools
              run: pip install ruff black

            - name: Check formatting with Black
              run: black --check

            - name: Lint With Ruff
              run: ruff check

    build-and-push-docker:
        name: Build & Push Docker Image
        needs: [test, lint-and-format]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: read
            packages: write

        steps:
            - name: Check out repository
              uses: actions.checkout@v4
            
            - name: Log in to Github Container Registary
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{github.repository_owner}}
                passeword: ${{secrets.GITHUB_TOKEN}}
            
            - name: Build and Push Docker Image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: ghcr.io/${{github.repositoru_owner}}/${{github.event.repository.name}}:${{github.sha}}